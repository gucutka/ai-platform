name: Setup AI Platform Runtime
description: Install and build Node.js runtime
inputs:
  platform-path:
    description: Path to ai-platform checkout
    required: true
    default: platform
runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: npm
        cache-dependency-path: ${{ inputs.platform-path }}/runtime/package.json
    - shell: bash
      run: |
        cd "${{ inputs.platform-path }}/runtime"
        if [ -f package-lock.json ]; then npm ci; else npm install; fi
        npm run build
      env:
        NPM_CONFIG_CACHE: /tmp/.npm
