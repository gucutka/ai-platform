name: Architecture Review
on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: number
      issue_number:
        required: true
        type: number
      platform_path:
        required: false
        type: string
        default: ai-platform
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      GH_PAT:
        required: false

  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number
        required: true
        type: number
      issue_number:
        description: Linked issue number
        required: true
        type: number

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  arch-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Checkout AI Platform
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.AI_PLATFORM_REPOSITORY || github.repository_owner }}
          path: ${{ inputs.platform_path || 'ai-platform' }}
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - uses: ./${{ inputs.platform_path || 'ai-platform' }}/.github/actions/setup-runtime
        with:
          platform-path: ${{ inputs.platform_path || 'ai-platform' }}

      - name: Run architecture-review-agent
        working-directory: ${{ inputs.platform_path || 'ai-platform' }}/runtime
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PROJECT_DIR: ${{ github.workspace }}
          PLATFORM_ROOT: ${{ github.workspace }}/${{ inputs.platform_path || 'ai-platform' }}
        run: |
          node dist/cli.js dispatch \
            --issue ${{ inputs.issue_number || github.event.inputs.issue_number }} \
            --agent architecture-review-agent \
            --pr ${{ inputs.pr_number || github.event.inputs.pr_number }}
