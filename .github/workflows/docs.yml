name: Documentation
on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: number
      pr_number:
        required: true
        type: number
      merge_sha:
        required: false
        type: string
    secrets:
      ANTHROPIC_API_KEY:
        required: true

permissions:
  contents: write
  issues: write

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: project

      - uses: actions/checkout@v4
        with:
          path: platform

      - uses: ./platform/.github/actions/setup-runtime
        with:
          platform-path: platform

      - name: Post-merge SDLC (docs + release draft)
        working-directory: platform/runtime
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PROJECT_DIR: ${{ github.workspace }}/project
          PLATFORM_ROOT: ${{ github.workspace }}/platform
        run: |
          node dist/cli.js post-merge \
            --issue ${{ inputs.issue_number }} \
            --pr ${{ inputs.pr_number }} \
            --merge-sha "${{ inputs.merge_sha }}" \
            --project-dir "$PROJECT_DIR"

      - name: Commit documentation updates
        working-directory: project
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md README.md 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No doc file changes to commit"
            exit 0
          fi
          git commit -m "docs: post-merge for issue #${{ inputs.issue_number }}"
          git push

      - name: Upload post-merge artifacts
        uses: actions/upload-artifact@v4
        with:
          name: post-merge-issue-${{ inputs.issue_number }}
          path: project/.ai-platform/runs/${{ inputs.issue_number }}/
