name: Optimization Sync
on:
  workflow_call:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: project

      - uses: actions/checkout@v4
        with:
          path: platform

      - uses: ./platform/.github/actions/setup-runtime
        with:
          platform-path: platform

      - name: Restore evaluation artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: ai-platform-trace-issue-*
          merge-multiple: true
          path: project/.ai-platform

      - name: Sync optimization hints
        working-directory: platform/runtime
        env:
          PROJECT_DIR: ${{ github.workspace }}/project
          PLATFORM_ROOT: ${{ github.workspace }}/platform
        run: node dist/cli.js optimization-sync

      - uses: actions/upload-artifact@v4
        with:
          name: optimization-hints
          path: project/.ai-platform/optimization/
          retention-days: 90
          if-no-files-found: warn
