name: AI Platform Pipeline
on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: number
    secrets:
      ANTHROPIC_API_KEY:
        required: true
  workflow_dispatch:
    inputs:
      issue_number:
        required: true
        type: number

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: project

      - uses: actions/checkout@v4
        with:
          path: platform

      - uses: ./platform/.github/actions/setup-runtime
        with:
          platform-path: platform

      - name: Run pipeline
        id: pipeline
        continue-on-error: true
        working-directory: platform/runtime
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PROJECT_DIR: ${{ github.workspace }}/project
          PLATFORM_ROOT: ${{ github.workspace }}/platform
        run: |
          node dist/cli.js run-pipeline --issue ${{ inputs.issue_number }}

      - name: Upload pipeline trace artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-platform-trace-issue-${{ inputs.issue_number }}
          path: project/.ai-platform/
          retention-days: 90
          if-no-files-found: warn

      - name: Fail if pipeline failed
        if: steps.pipeline.outcome == 'failure'
        run: exit 1
