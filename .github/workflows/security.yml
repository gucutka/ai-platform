name: Security
on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: number
      issue_number:
        required: true
        type: number
    secrets:
      ANTHROPIC_API_KEY:
        required: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: project

      - uses: actions/checkout@v4
        with:
          path: platform

      - uses: ./platform/.github/actions/setup-runtime
        with:
          platform-path: platform

      - name: Deterministic SAST
        working-directory: platform/runtime
        env:
          PROJECT_DIR: ${{ github.workspace }}/project
          PLATFORM_ROOT: ${{ github.workspace }}/platform
        run: |
          node dist/cli.js security-scan \
            --issue ${{ inputs.issue_number }} \
            --project-dir "$PROJECT_DIR"

      - name: Build ContextPack v1
        working-directory: platform/runtime
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PROJECT_DIR: ${{ github.workspace }}/project
          PLATFORM_ROOT: ${{ github.workspace }}/platform
        run: |
          node dist/cli.js build-context \
            --issue ${{ inputs.issue_number }} \
            --agent security-agent

      - name: Dispatch security-agent
        working-directory: platform/runtime
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PROJECT_DIR: ${{ github.workspace }}/project
          PLATFORM_ROOT: ${{ github.workspace }}/platform
        run: |
          node dist/cli.js dispatch \
            --issue ${{ inputs.issue_number }} \
            --agent security-agent \
            --pr ${{ inputs.pr_number }} \
            --project-dir "$PROJECT_DIR"

      - name: Upload security artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-report-issue-${{ inputs.issue_number }}
          path: project/.ai-platform/runs/${{ inputs.issue_number }}/
          if-no-files-found: warn
