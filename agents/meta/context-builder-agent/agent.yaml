# Agent Contract Model v1.0
agent_id: context-builder-agent
version: "1.0.0"
type: meta
phase: orchestration
responsibility: "Retrieval, ContextPack v1, compression, dependency discovery."

inputs:
  contracts:
    []
  github:
    issue: true
    pr: false
  context_pack:
    tier: T0
    layers: [business, product, technical, code]

outputs:
  contracts:
    - name: ContextPack
      version: "1.0"
  github:
    labels: []
    comments: true
    pr_actions: false

skills:
  sdlc: ['retrieval']
  technology: []
  project: []

constraints:
  no_direct_retrieval: false
  allowed_paths: from_manifest
  max_output_tokens: 4000
  runtime: cloud-agent
  modes: [initial, fix, refactor]

escalation:
  conditions:
    - condition: retry_exhausted
      escalate_to: tech-lead
      sla: 4h
    - condition: arch_review_failed_high_risk
      escalate_to: architect
      sla: 8h
  auto_block_labels: [agent-route:blocked]

retry:
  max_attempts: 3
  backoff: exponential
  retry_on: [transient_error, contract_validation_fail]
  escalate_after: 3
