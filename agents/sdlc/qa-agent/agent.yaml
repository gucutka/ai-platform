# Agent Contract Model v1.0
agent_id: qa-agent
version: "1.0.0"
type: sdlc
phase: verification
responsibility: "Tests and AC verification."

inputs:
  contracts:
    - name: ReviewReport
      version: "1.0"
      required: true
  github:
    issue: true
    pr: true
  context_pack:
    tier: T2
    layers: [business, product, technical, code]

outputs:
  contracts:
    - name: VerificationResult
      version: "1.0"
  github:
    labels: []
    comments: true
    pr_actions: false

skills:
  sdlc: ['test-generation', 'acceptance-criteria-mapping']
  technology: ['playwright', 'jest']
  project: []

constraints:
  no_direct_retrieval: true
  allowed_paths: from_manifest
  max_output_tokens: 8000
  runtime: cloud-agent
  modes: [initial, fix, refactor]

escalation:
  conditions:
    - condition: retry_exhausted
      escalate_to: tech-lead
      sla: 4h
    - condition: arch_review_failed_high_risk
      escalate_to: architect
      sla: 8h
  auto_block_labels: [agent-route:blocked]

retry:
  max_attempts: 3
  backoff: exponential
  retry_on: [transient_error, contract_validation_fail]
  escalate_after: 3
