agent_id: review-agent
enabled: true
model: claude-opus-4-5
max_tokens: 4096
input_contracts:
  - ImplementationPlan@1.0
  - TriageResult@1.0
  - VerificationResult@1.0
output_contract: ReviewReport@1.0
required_context:
  - issue
  - manifest
  - plan
  - pr_diff
  - acceptance_criteria
skills:
  core: [github-integration]
  sdlc: [code-review]
retry:
  max_attempts: 3
  backoff_ms: [30000, 120000, 300000]
failure_handling:
  label: human-review:required
verdict_values: [PASS, FAIL]
