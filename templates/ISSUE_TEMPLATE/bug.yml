name: Bug
description: Bug report with Agentic SDLC workflow
title: "[Bug]: "
labels: ["agent-route:pending"]
body:
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options: ["frontend", "backend", "fullstack", "infra", "unknown"]
