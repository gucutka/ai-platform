# Project repo — AI Platform Pipeline
name: AI Platform Pipeline
on:
  issues:
    types: [opened, labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        required: true
        type: number

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  pipeline:
    uses: ${{ format('{0}/ai-platform/.github/workflows/pipeline.yml@main', github.repository_owner) }}
    with:
      issue_number: ${{ github.event.issue.number || inputs.issue_number }}
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
